# One-time, manually-triggered keystore generation (ADR-0004): the developer
# has no local JDK, so we mint the Android signing keystore on a CI runner and
# print it — base64-encoded, together with generated passwords — exactly ONCE
# in the run log for the owner to copy into repository secrets.
#
# Nothing is committed and no secret is written by this workflow; it only
# produces values for the owner to paste into:
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
#   ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
#
# Re-running mints a NEW keystore; only ever do that if you intend to abandon
# the ability to update previously-installed APKs (see docs/release.md).
name: Generate Android keystore (one-time)

on:
  workflow_dispatch:
    inputs:
      alias:
        description: Key alias
        default: relay
        required: true
      validity_days:
        description: Validity in days (10000 ≈ 27 years)
        default: '10000'
        required: true

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore and print secrets
        run: |
          set -euo pipefail
          STORE_PASS=$(openssl rand -base64 24)
          KEY_PASS=$STORE_PASS   # single-alias PKCS12: store and key share one password
          ALIAS='${{ github.event.inputs.alias }}'

          keytool -genkeypair -v \
            -keystore release.pfx -storetype pkcs12 \
            -alias "$ALIAS" \
            -keyalg RSA -keysize 4096 \
            -validity '${{ github.event.inputs.validity_days }}' \
            -storepass "$STORE_PASS" -keypass "$KEY_PASS" \
            -dname "CN=Relay, OU=Relay, O=Relay open-source project, C=US"

          B64=$(base64 -w0 release.pfx)

          echo "::add-mask::$STORE_PASS"
          echo "::add-mask::$B64"

          echo "=================================================================="
          echo " Copy each value below into a repository secret (Settings →"
          echo " Secrets and variables → Actions). They are masked in the log, so"
          echo " expand this step and copy from the raw log if needed."
          echo "=================================================================="
          echo ""
          echo "ANDROID_KEY_ALIAS        = $ALIAS"
          echo "ANDROID_KEYSTORE_PASSWORD= $STORE_PASS"
          echo "ANDROID_KEY_PASSWORD     = $STORE_PASS"
          echo ""
          echo "ANDROID_KEYSTORE_BASE64  = (below, single line)"
          echo "$B64"
          echo ""
          echo "=================================================================="
          echo " Keep a backup of these values in a password manager. Losing them"
          echo " means future releases cannot update apps installed from old ones."
          echo "=================================================================="
