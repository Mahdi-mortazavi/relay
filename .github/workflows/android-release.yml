# Tag-triggered Android release (ADR-0004): push android-vX.Y.Z to publish.
# workflow_dispatch builds the same artifacts WITHOUT creating a release —
# a safe dry run of this pipeline.
name: Android release

on:
  push:
    tags: ['android-v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the changelog

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/android-v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/android-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dry-run" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing — see docs/release.md"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.pfx"
          keytool -list -keystore "$RUNNER_TEMP/release.pfx" \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" -storetype pkcs12 | head -20

      - name: Build signed APK and AAB
        env:
          RELAY_KEYSTORE_FILE: ${{ runner.temp }}/release.pfx
          RELAY_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELAY_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELAY_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease bundleRelease \
            -PrelayVersion=${{ steps.version.outputs.version }}

      - name: Collect artifacts
        id: artifacts
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dist
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          AAB=$(find app/build/outputs/bundle/release -name '*.aab' | head -1)
          cp "$APK" "dist/relay-arm64-v8a-$VERSION.apk"
          cp "$AAB" "dist/relay-$VERSION.aab"
          ls -la dist

      - name: Generate changelog
        id: changelog
        run: |
          PREV=$(git tag -l 'android-v*' --sort=-v:refname | sed -n 2p)
          RANGE=$([ -n "$PREV" ] && echo "$PREV..HEAD" || echo "HEAD")
          # Write to a file (never interpolated into a shell command) so commit
          # messages with quotes/backticks/parens can't break release creation.
          {
            echo "## Relay for Android ${{ steps.version.outputs.version }}"
            echo
            echo "### How to install"
            echo "Download **relay-arm64-v8a-${{ steps.version.outputs.version }}.apk**, allow"
            echo "\"install from unknown sources\" when prompted, and install. The .aab is for"
            echo "store distribution and is not installable directly."
            echo
            echo "### Changes"
            git log $RANGE --no-merges --pretty='- %s' -- ../android ../shared . | head -100
          } > "$RUNNER_TEMP/notes.md"

      - name: Upload dry-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: android-release-dry-run
          path: android/dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/android-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" dist/* \
            --title "Relay for Android ${{ steps.version.outputs.version }}" \
            --notes-file "$RUNNER_TEMP/notes.md"
