# Tag-triggered Windows release (ADR-0004): push windows-vX.Y.Z to publish.
# workflow_dispatch builds the same installers WITHOUT creating a release —
# a safe dry run of this pipeline.
name: Windows release

on:
  push:
    tags: ['windows-v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the changelog

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/windows-v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/windows-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dry-run" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Publish x64 and x86 (self-contained)
        shell: pwsh
        run: |
          foreach ($arch in @('x64', 'x86')) {
            msbuild windows/Relay.App/Relay.App.csproj /restore /t:Publish /v:minimal `
              /p:Configuration=Release `
              /p:Platform=$arch `
              /p:RuntimeIdentifier=win-$arch `
              /p:SelfContained=true `
              /p:WindowsAppSDKSelfContained=true `
              /p:PublishDir="$env:GITHUB_WORKSPACE\publish-$arch\"
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }

      - name: Build installers (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress; }
          if (-not (Test-Path $iscc)) { $iscc = "iscc" }
          foreach ($arch in @('x64', 'x86')) {
            & $iscc "/DAppVersion=${{ steps.version.outputs.version }}" `
                    "/DAppPlatform=$arch" `
                    "/DSourceDir=$env:GITHUB_WORKSPACE\publish-$arch" `
                    windows\installer\relay.iss
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }
          Get-ChildItem windows\installer\output

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREV=$(git tag -l 'windows-v*' --sort=-v:refname | sed -n 2p)
          RANGE=$([ -n "$PREV" ] && echo "$PREV..HEAD" || echo "HEAD")
          # Write to a file (never interpolated into a shell command) so commit
          # messages with quotes/backticks/parens can't break release creation.
          {
            echo "## Relay for Windows ${{ steps.version.outputs.version }}"
            echo
            echo "### How to install"
            echo "Download **Relay-Setup-x64-…exe** (almost all modern PCs) or the x86 build"
            echo "for 32-bit systems, then run it. Windows SmartScreen may warn because the"
            echo "installer is not code-signed (see docs/release.md): choose More info → Run anyway."
            echo
            echo "### Changes"
            git log $RANGE --no-merges --pretty='- %s' -- windows shared .github | head -100
          } > "$RUNNER_TEMP/notes.md"

      - name: Upload dry-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-dry-run
          path: windows/installer/output/*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/windows-v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" windows/installer/output/*.exe \
            --title "Relay for Windows ${{ steps.version.outputs.version }}" \
            --notes-file "$RUNNER_TEMP/notes.md"
